name: Build Feedback pdf

on: [push]
jobs:
  html_to_pdf:
    name: Generate PDF
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    permissions:
      contents: write  

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: html to pdf
        uses: LukaszLapaj/html-to-pdf-action@master
        with:
          htmlFile: ./ads_assignment_XX.html
          outputFile: ./feedback.pdf
          pdfOptions: '{"margin": {"top": "1px", "left": "100px", "right": "100px", "bottom": "100px"}}'
          
      - name: update file and push to remote
        run: |
         git config --local user.email "action@github.com"
         git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Update feedback.pdf"
          git push
